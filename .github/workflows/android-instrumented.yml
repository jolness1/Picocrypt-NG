name: android-instrumented

permissions:
  contents: read

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-instrumented:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.26.0"
        cache-dependency-path: src/go.sum

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260209203831-923679eb55af
        go install golang.org/x/mobile/cmd/gobind@v0.0.0-20260209203831-923679eb55af
        mkdir -p "$(go env GOPATH | cut -d: -f1)/pkg/gomobile"

    - name: Set up Android SDK
      uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407
      with:
        api-level: 36
        ndk-version: "29.0.14206865"
        build-tools: "36.0.0"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Install NDK 29 using sdkmanager
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "ndk;29.0.14206865"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          android/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Compute Android version metadata
      run: |
        VERSION=$(cat VERSION)
        IFS='.' read -r major minor patch <<< "$VERSION"
        major=${major:-0}
        minor=${minor:-0}
        patch=${patch:-0}
        VERSION_CODE=$((10#$major * 10000 + 10#$minor * 100 + 10#$patch))
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_NAME=$VERSION" >> "$GITHUB_ENV"
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

    - name: Build Go Mobile AAR
      working-directory: android
      run: |
        chmod +x build-gomobile.sh
        ./build-gomobile.sh

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    - name: Run Unit Tests
      working-directory: android
      run: ./gradlew test

    - name: Build Debug APK
      working-directory: android
      run: ./gradlew assembleDebug

    - name: Compile Instrumented Tests
      working-directory: android
      run: ./gradlew :app:compileDebugAndroidTestKotlin

    - name: Assemble Instrumented Test APK
      working-directory: android
      run: ./gradlew :app:assembleDebugAndroidTest

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Reset cmdline-tools for emulator runner
      run: sudo rm -rf "$ANDROID_HOME/cmdline-tools"

    - name: Run focused instrumented tests
      uses: ReactiveCircus/android-emulator-runner@e93c997dcab69054e999e3924af3d21c4a736e13
      with:
        api-level: 36
        arch: x86_64
        script: |
          cd android && ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=io.github.picocrypt_ng.picocrypt_ng.ui.components.PasswordCardTest,io.github.picocrypt_ng.picocrypt_ng.ui.components.ProgressCardTest

    - name: Prepare artifacts
      run: |
        mkdir -p out
        cp android/app/build/outputs/apk/debug/app-debug.apk out/Picocrypt-NG-android-debug.apk

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: android-instrumented-ONLY-FOR-TESTING
        path: out/*.apk
        if-no-files-found: error
        compression-level: 9
