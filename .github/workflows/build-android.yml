name: build-android

permissions:
  contents: write

on:
  push:
    paths:
      - "VERSION"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.24.2"
        cache-dependency-path: src/go.sum

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20260217195705-b56b3793a9c4
        gomobile init

    - name: Set up Android SDK
      uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407
      with:
        api-level: 36
        ndk-version: "29.0.14206865"
        build-tools: "36.0.0"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Install NDK 29 using sdkmanager
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "ndk;29.0.14206865"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> "$GITHUB_ENV"

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          android/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Compute Android version metadata
      run: |
        VERSION=$(cat VERSION)
        IFS='.' read -r major minor patch <<< "$VERSION"
        major=${major:-0}
        minor=${minor:-0}
        patch=${patch:-0}
        VERSION_CODE=$((10#$major * 10000 + 10#$minor * 100 + 10#$patch))
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_NAME=$VERSION" >> "$GITHUB_ENV"
        echo "ORG_GRADLE_PROJECT_PICOCRYPT_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

    - name: Build Go Mobile AAR
      working-directory: android
      run: |
        chmod +x build-gomobile.sh
        ./build-gomobile.sh

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    - name: Run Unit Tests
      working-directory: android
      run: ./gradlew test

    - name: Build Debug APK
      working-directory: android
      run: ./gradlew assembleDebug

    - name: Build Release APK For Verification
      working-directory: android
      run: ./gradlew assembleRelease

    - name: Prepare artifacts
      run: |
        mkdir -p out
        cp android/app/build/outputs/apk/debug/app-debug.apk out/Picocrypt-NG-android-debug.apk

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: build-android
        path: out/*.apk
        if-no-files-found: error
        compression-level: 9

    - name: Generate checksums
      run: |
        cd out
        echo "ANDROID_CHECKSUMS<<EOF" >> "$GITHUB_ENV"
        for apk in *.apk; do
          hash=$(sha256sum "$apk" | cut -d ' ' -f1)
          echo "\`sha256($apk)  $hash\`" >> "$GITHUB_ENV"
        done
        echo "EOF" >> "$GITHUB_ENV"

    - name: Release
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
      with:
        files: out/*.apk
        tag_name: ${{ env.VERSION }}
        make_latest: true
        append_body: true
        body: |
          **Android (debug APK):**
          ${{ env.ANDROID_CHECKSUMS }}
