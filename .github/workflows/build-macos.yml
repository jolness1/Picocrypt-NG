name: build-macos

permissions:
  contents: write

on:
  push:
    paths:
      - "VERSION"
      - ".github/workflows/build-macos.yml"
      - ".github/scripts/assert-macos-minos.sh"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    env:
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      CGO_CFLAGS: "-mmacosx-version-min=15.0"
      CGO_LDFLAGS: "-mmacosx-version-min=15.0"
    steps:
    - uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache-dependency-path: src/go.sum

    - name: Install packages
      run: |
        brew install glfw glew

    - name: Install dependencies
      run: |
        cd src
        go mod download

    - name: Run tests
      # Skip internal/crypto and internal/volume - Argon2 is extremely slow on macOS ARM64 runners
      run: |
        cd src
        go test -v -race -timeout 15m ./internal/encoding/... ./internal/fileops/... ./internal/header/... ./internal/keyfile/... ./internal/util/...

    - name: Build GUI
      run: |
        cd src
        go build -v -ldflags="-s -w" -o Picocrypt-NG ./cmd/picocrypt
      env:
        CGO_ENABLED: 1

    - name: Verify macOS GUI deployment target
      run: |
        bash .github/scripts/assert-macos-minos.sh src/Picocrypt-NG 15.0

    - name: Build CLI-only (no graphics dependencies)
      run: |
        cd src
        go build -v -tags cli -ldflags="-s -w" -o Picocrypt-NG-cli-macos ./cmd/picocrypt
      env:
        CGO_ENABLED: 1

    - name: Package as .app in a .dmg
      run: |
        mv dist/macos/Picocrypt-NG.app.zip .
        unzip -d Picocrypt-NG.app Picocrypt-NG.app.zip
        rm Picocrypt-NG.app.zip
        mv src/Picocrypt-NG Picocrypt-NG.app/Contents/MacOS/Picocrypt-NG
        rm Picocrypt-NG.app/Contents/Resources/icon.icns
        mv dist/macos/iconSmall.icns Picocrypt-NG.app/Contents/Resources/icon.icns
        mkdir out
        cp -R Picocrypt-NG.app out
        hdiutil create Picocrypt-NG.dmg -volname Picocrypt-NG -fs APFS -format UDZO -srcfolder out

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: build-macos
        path: |
          Picocrypt-NG.dmg
          src/Picocrypt-NG-cli-macos
        if-no-files-found: error
        compression-level: 9

    - name: Get version tag
      run: |
        VERSION=$(cat VERSION)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Generate checksums
      run: |
        HASH=$(shasum -a 256 Picocrypt-NG.dmg | cut -d ' ' -f1)
        echo "CHECKSUM_PICOCRYPT_NG=$HASH" >> $GITHUB_ENV
        HASH_CLI=$(shasum -a 256 src/Picocrypt-NG-cli-macos | cut -d ' ' -f1)
        echo "CHECKSUM_PICOCRYPT_NG_CLI_MACOS=$HASH_CLI" >> $GITHUB_ENV

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          Picocrypt-NG.dmg
          src/Picocrypt-NG-cli-macos
        tag_name: ${{ env.VERSION }}
        make_latest: true
        append_body: true
        body: |
          **macOS:**
          `sha256(Picocrypt-NG.dmg)        ${{ env.CHECKSUM_PICOCRYPT_NG }}`
          `sha256(Picocrypt-NG-cli-macos)  ${{ env.CHECKSUM_PICOCRYPT_NG_CLI_MACOS }}`
