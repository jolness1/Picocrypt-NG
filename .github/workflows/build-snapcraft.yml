name: build-snapcraft

permissions:
  contents: read

on:
  push:
    paths:
      - "VERSION"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-snapcraft:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Copy Snapcraft files to source
      run: |
        cp -r dist/snapcraft/* src/
        mkdir -p src/dist/mime
        cp dist/mime/application-x-pcv.xml src/dist/mime/
        cp -r images src/

    - name: Fix permissions
      run: |
        chmod -R a+rX src

    - name: List contents of src
      run: |
        ls -l src
        ls -l src/snapcraft.yaml || echo "snapcraft.yaml not found"

    - name: Snapcraft
      uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79
      with:
        path: src

    - name: Prepare artifacts
      run: |
        mkdir -p out
        mv src/*.snap out/

    - name: Upload .snap artifacts
      uses: actions/upload-artifact@v7
      with:
        name: build-snapcraft
        path: out/*.snap
        if-no-files-found: error
        compression-level: 9

  release:
    needs: build-snapcraft
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6

    - name: Download .snap artifacts
      uses: actions/download-artifact@v8
      with:
        name: build-snapcraft
        path: out

    - name: Get version tag
      run: |
        VERSION=$(cat VERSION)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Generate checksums
      run: |
        cd out
        for snap in *.snap; do
          hash=$(sha256sum "$snap" | cut -d ' ' -f1)
          name=$(basename "$snap")
          echo "CHECKSUM_SNAP=$hash" >> $GITHUB_ENV
          echo "SNAP_NAME=$name" >> $GITHUB_ENV
        done

    - name: Release
      uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae
      with:
        files: out/*.snap
        tag_name: ${{ env.VERSION }}
        make_latest: true
        append_body: true
        body: |
          **Linux (Snap):**
          `sha256(${{ env.SNAP_NAME }})  ${{ env.CHECKSUM_SNAP }}`
