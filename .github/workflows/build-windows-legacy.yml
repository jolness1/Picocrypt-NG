name: build-windows-legacy

permissions:
  contents: read

on:
  push:
    paths:
      - "VERSION"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      GO_LEGACY_SHA256: 82d44d1f777ae7c88aa52562979f1606f60bc5ad8df00c727a624c0ce4e5caf2
      UPX_SHA256: 41c7492edeed0f7e67d347ca9e8d2131e2af7ca7a7695f92283a8e655c251c13
    steps:
    - uses: actions/checkout@v6

    - name: Cache go-legacy-win7
      id: cache-go-legacy
      uses: actions/cache@v4
      with:
        path: C:\go-legacy
        key: ${{ runner.os }}-go-legacy-${{ env.GO_LEGACY_SHA256 }}
        restore-keys: |
          ${{ runner.os }}-go-legacy-

    - name: Download go-legacy-win7
      if: steps.cache-go-legacy.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        # Download go-legacy-win7 (Go 1.25.x with Windows 7 support)
        Invoke-WebRequest -OutFile go-legacy.zip https://github.com/thongtech/go-legacy-win7/releases/download/v1.25.5-1/go-legacy-win7-1.25.5-1.windows_amd64.zip
        $expectedHash = $env:GO_LEGACY_SHA256
        $actualHash = (Get-FileHash go-legacy.zip -Algorithm SHA256).Hash.ToLower()
        if ($actualHash -ne $expectedHash) {
          throw "Checksum mismatch for go-legacy.zip: expected $expectedHash, got $actualHash"
        }
        Expand-Archive -DestinationPath C:\go-legacy go-legacy.zip

    - name: Add go-legacy-win7 to PATH
      shell: pwsh
      run: |
        echo "C:\go-legacy\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Verify Go installation
      run: |
        go version
        go env

    - name: Install dependencies
      run: |
        cd src
        go mod download

    - name: Run tests
      run: |
        cd src
        go test -v -timeout 15m ./internal/cli ./internal/fileops ./internal/volume
      env:
        PICOCRYPT_RUN_CLI_INTEGRATION: 1

    - name: Build CLI-only legacy binary
      run: |
        cd src
        go build -v -tags cli -ldflags="-s -w -extldflags=-static" -o Picocrypt-NG-cli-Legacy.exe ./cmd/picocrypt
      env:
        CGO_ENABLED: 1
        GOAMD64: v1

    - name: Compress with upx
      shell: pwsh
      run: |
        Invoke-WebRequest -OutFile upx.zip https://github.com/upx/upx/releases/download/v5.1.0/upx-5.1.0-win64.zip
        $expectedHash = $env:UPX_SHA256
        $actualHash = (Get-FileHash upx.zip -Algorithm SHA256).Hash.ToLower()
        if ($actualHash -ne $expectedHash) {
          throw "Checksum mismatch for upx.zip: expected $expectedHash, got $actualHash"
        }
        Expand-Archive -DestinationPath upx upx.zip
        upx/upx-5.1.0-win64/upx.exe --lzma src/Picocrypt-NG-cli-Legacy.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: build-windows-legacy
        path: src/Picocrypt-NG-cli-Legacy.exe
        if-no-files-found: error
        compression-level: 9

  release:
    needs: build
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6

    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        name: build-windows-legacy
        path: artifacts/build-windows-legacy

    - name: Get version tag
      shell: pwsh
      run: |
        $version = Get-Content -Path "VERSION"
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: Generate checksums
      shell: pwsh
      run: |
        $hash = Get-FileHash "artifacts/build-windows-legacy/Picocrypt-NG-cli-Legacy.exe" -Algorithm SHA256
        echo "CHECKSUM_LEGACY_CLI=$($hash.Hash)" >> $env:GITHUB_ENV

    - name: Release
      uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae
      with:
        files: artifacts/build-windows-legacy/Picocrypt-NG-cli-Legacy.exe
        tag_name: ${{ env.VERSION }}
        make_latest: true
        append_body: true
        body: |
          **Windows Legacy CLI (Windows 7/8):**
          `sha256(Picocrypt-NG-cli-Legacy.exe)  ${{ env.CHECKSUM_LEGACY_CLI }}`
