name: build-windows

permissions:
  contents: read

on:
  push:
    paths:
      - "VERSION"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2025
    permissions:
      contents: read
    env:
      RESHACKER_SHA256: e5a5b6d6be38ae3eb20e72b09f257f284bab2deb5f37164e9f2faefd23f27cf4
      UPX_SHA256: 41c7492edeed0f7e67d347ca9e8d2131e2af7ca7a7695f92283a8e655c251c13
    steps:
    - uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache-dependency-path: src/go.sum

    - name: Install dependencies
      run: |
        cd src
        go mod download

    - name: Run tests
      run: |
        cd src
        go test -v -timeout 15m ./...
      env:
        PICOCRYPT_RUN_CLI_INTEGRATION: 1

    - name: Build GUI
      run: |
        cd src
        go build -v -ldflags="-s -w -H=windowsgui -extldflags=-static" -o 1.exe ./cmd/picocrypt
      env:
        CGO_ENABLED: 1
        GOAMD64: v1

    - name: Build CLI-only (no graphics dependencies)
      run: |
        cd src
        go build -v -tags cli -ldflags="-s -w -extldflags=-static" -o Picocrypt-NG-cli.exe ./cmd/picocrypt
      env:
        CGO_ENABLED: 1
        GOAMD64: v1

    - name: Add icon, manifest, and version info
      shell: pwsh
      run: |
        Invoke-WebRequest -OutFile reshacker_setup.zip https://github.com/user-attachments/files/18878075/reshacker_setup.zip
        $expectedHash = $env:RESHACKER_SHA256
        $actualHash = (Get-FileHash reshacker_setup.zip -Algorithm SHA256).Hash.ToLower()
        if ($actualHash -ne $expectedHash) {
          throw "Checksum mismatch for reshacker_setup.zip: expected $expectedHash, got $actualHash"
        }
        Expand-Archive -DestinationPath reshacker_setup reshacker_setup.zip
        reshacker_setup/reshacker_setup.exe /SILENT
        Start-Sleep -Seconds 60
        Invoke-Expression "& `"$Env:P`" -open src/1.exe -save src/2.exe -action addoverwrite -res images/key.ico -mask `"ICONGROUP,MAINICON,`""
        Start-Sleep -Seconds 30
        Invoke-Expression "& `"$Env:P`" -open src/2.exe -save src/3.exe -action addoverwrite -res images/key.ico -mask `"ICONGROUP,A,`""
        Start-Sleep -Seconds 30
        Invoke-Expression "& `"$Env:P`" -open src/3.exe -save src/4.exe -action addoverwrite -res dist/windows/manifest.xml -mask `"MANIFEST,1,`""
        Start-Sleep -Seconds 30
        Invoke-Expression "& `"$Env:P`" -open dist/windows/versioninfo.rc -save resources.res -action compile"
        Start-Sleep -Seconds 30
        Invoke-Expression "& `"$Env:P`" -open src/4.exe -save src/5.exe -action addoverwrite -res resources.res"
        Start-Sleep -Seconds 30
      env:
        P: "C:\\Program Files (x86)\\Resource Hacker\\ResourceHacker.exe"

    - name: Compress with upx
      shell: pwsh
      run: |
        Invoke-WebRequest -OutFile upx.zip https://github.com/upx/upx/releases/download/v5.1.0/upx-5.1.0-win64.zip
        $expectedHash = $env:UPX_SHA256
        $actualHash = (Get-FileHash upx.zip -Algorithm SHA256).Hash.ToLower()
        if ($actualHash -ne $expectedHash) {
          throw "Checksum mismatch for upx.zip: expected $expectedHash, got $actualHash"
        }
        Expand-Archive -DestinationPath upx upx.zip
        upx/upx-5.1.0-win64/upx.exe --lzma -o src/Picocrypt-NG.exe src/5.exe
        upx/upx-5.1.0-win64/upx.exe --lzma src/Picocrypt-NG-cli.exe

    # === Phase 4 (FA-WIN-04): build NSIS installer ===
    # NSIS is NOT pre-installed on windows-2025 [actions/runner-images#11754,
    # verified 2026-05-01]; CONTEXT D-04 assumed pre-install based on
    # windows-2022 precedent — invalidated. We install via choco; choco itself
    # is part of the runner baseline (no SHA pinning required for choco-managed
    # packages — choco verifies its own signatures).
    - name: Rename portable artifact
      shell: pwsh
      run: |
        Move-Item src/Picocrypt-NG.exe src/Picocrypt-NG-portable.exe

    - name: Install NSIS
      shell: pwsh
      run: |
        choco install -y --no-progress nsis
        & "C:\Program Files (x86)\NSIS\makensis.exe" -VERSION

    - name: Build NSIS installer
      shell: pwsh
      run: |
        $version = (Get-Content -Path "VERSION" -Raw).Trim()
        Write-Host "Building installer for version: $version"
        # Pass absolute path so NSIS ${__FILEDIR__} resolves to the absolute
        # script directory; otherwise the Icon directive re-applies script-dir
        # resolution to a relative ${__FILEDIR__}, doubling the path
        # (D:\...\dist\windows\dist\windows\..\..\images\key.ico — file not found).
        $scriptPath = (Resolve-Path "dist\windows\installer.nsi").Path
        & "C:\Program Files (x86)\NSIS\makensis.exe" `
          -WX `
          -V4 `
          "-DVERSION=$version" `
          "$scriptPath"
        if ($LASTEXITCODE -ne 0) {
          throw "makensis failed with exit code $LASTEXITCODE"
        }

    - name: Smoke-test installer
      shell: pwsh
      run: |
        $setup = "dist\windows\Picocrypt-NG-Setup.exe"
        if (-not (Test-Path $setup)) {
          throw "Setup.exe not produced at $setup"
        }
        $size = (Get-Item $setup).Length
        Write-Host "Setup.exe size: $size bytes"
        if ($size -lt 1MB) {
          throw "Setup.exe suspiciously small (< 1 MB): $size bytes"
        }
        if ($size -gt 100MB) {
          throw "Setup.exe suspiciously large (> 100 MB): $size bytes"
        }
    # === end Phase 4 ===

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: build-windows
        path: |
          src/Picocrypt-NG-portable.exe
          src/Picocrypt-NG-cli.exe
          dist/windows/Picocrypt-NG-Setup.exe
        if-no-files-found: error
        compression-level: 9

  release:
    needs: build
    runs-on: windows-2025
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6

    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        name: build-windows
        path: artifacts/build-windows

    - name: Get version tag
      shell: pwsh
      run: |
        $version = Get-Content -Path "VERSION"
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: Generate checksums
      shell: pwsh
      run: |
        $hash = Get-FileHash "artifacts/build-windows/Picocrypt-NG-portable.exe" -Algorithm SHA256
        echo "CHECKSUM_PICOCRYPT_NG_PORTABLE=$($hash.Hash)" >> $env:GITHUB_ENV
        $hashCli = Get-FileHash "artifacts/build-windows/Picocrypt-NG-cli.exe" -Algorithm SHA256
        echo "CHECKSUM_PICOCRYPT_NG_CLI=$($hashCli.Hash)" >> $env:GITHUB_ENV
        $hashSetup = Get-FileHash "artifacts/build-windows/Picocrypt-NG-Setup.exe" -Algorithm SHA256
        echo "CHECKSUM_PICOCRYPT_NG_SETUP=$($hashSetup.Hash)" >> $env:GITHUB_ENV

    - name: Release
      uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae
      with:
        files: |
          artifacts/build-windows/Picocrypt-NG-portable.exe
          artifacts/build-windows/Picocrypt-NG-cli.exe
          artifacts/build-windows/Picocrypt-NG-Setup.exe
        tag_name: ${{ env.VERSION }}
        make_latest: true
        append_body: true
        body: |
          **Windows:**
          `sha256(Picocrypt-NG-Setup.exe)     ${{ env.CHECKSUM_PICOCRYPT_NG_SETUP }}`
          `sha256(Picocrypt-NG-portable.exe)  ${{ env.CHECKSUM_PICOCRYPT_NG_PORTABLE }}`
          `sha256(Picocrypt-NG-cli.exe)       ${{ env.CHECKSUM_PICOCRYPT_NG_CLI }}`
