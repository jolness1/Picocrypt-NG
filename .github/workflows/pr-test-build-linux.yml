name: pr-test-build-linux

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: pr-test-build-linux-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            upx_pkg: upx-5.1.0-amd64_linux
            gui_binary: Picocrypt-NG
            cli_binary: Picocrypt-NG-cli
            artifact_name: pr-test-build-linux-amd64-ONLY-FOR-TESTING
            build_deb: "true"
          - arch: arm64
            runner: ubuntu-24.04-arm
            upx_pkg: upx-5.1.0-arm64_linux
            gui_binary: Picocrypt-NG-arm64
            cli_binary: Picocrypt-NG-cli-arm64
            artifact_name: pr-test-build-linux-arm64-ONLY-FOR-TESTING
            build_deb: "false"
    runs-on: ${{ matrix.runner }}
    steps:
    - uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache-dependency-path: src/go.sum

    - name: Update repository
      run: |
        sudo apt update

    - name: Install packages
      run: |
        sudo apt install -y gcc pkg-config libgl1-mesa-dev xorg-dev libgtk-3-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev wget

    - name: Install dependencies
      run: |
        cd src
        go mod download

    - name: Run tests
      run: |
        cd src
        if [ "${{ matrix.arch }}" = "amd64" ]; then
          PICOCRYPT_RUN_CLI_INTEGRATION=1 CGO_ENABLED=1 go test -v -race -timeout 15m ./...
        else
          PICOCRYPT_RUN_CLI_INTEGRATION=1 CGO_ENABLED=1 go test -v -timeout 15m ./...
        fi

    - name: Build GUI
      run: |
        cd src
        if [ "${{ matrix.arch }}" = "amd64" ]; then
          export GOAMD64=v1
        fi
        GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build -v -ldflags="-s -w" -o "${{ matrix.gui_binary }}" ./cmd/picocrypt

    - name: Build CLI-only (no graphics dependencies)
      run: |
        cd src
        if [ "${{ matrix.arch }}" = "amd64" ]; then
          export GOAMD64=v1
        fi
        GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build -v -tags cli -ldflags="-s -w" -o "${{ matrix.cli_binary }}" ./cmd/picocrypt

    - name: Compress with upx
      run: |
        wget -O upx.tar.xz https://github.com/upx/upx/releases/download/v5.1.0/${{ matrix.upx_pkg }}.tar.xz
        tar -xf upx.tar.xz
        ${{ matrix.upx_pkg }}/upx --lzma "src/${{ matrix.gui_binary }}"
        ${{ matrix.upx_pkg }}/upx --lzma "src/${{ matrix.cli_binary }}"

    - name: Package as .deb
      if: matrix.build_deb == 'true'
      run: |
        wget https://github.com/user-attachments/files/21703014/Picocrypt-NG.zip
        python -m zipfile -e Picocrypt-NG.zip Picocrypt-NG
        cp "src/${{ matrix.gui_binary }}" Picocrypt-NG/Picocrypt-NG/usr/bin/picocrypt-ng-gui
        VERSION=$(cat VERSION)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Version: $VERSION" >> Picocrypt-NG/Picocrypt-NG/DEBIAN/control
        echo "Version=$VERSION" >> Picocrypt-NG/Picocrypt-NG/usr/share/applications/picocrypt-ng.desktop
        cd Picocrypt-NG
        dpkg-deb -Zxz --build --root-owner-group Picocrypt-NG

    - name: Prepare to upload artifacts
      run: |
        mkdir -p out
        mv "src/${{ matrix.gui_binary }}" out
        mv "src/${{ matrix.cli_binary }}" out
        if [ "${{ matrix.build_deb }}" = "true" ]; then
          mv Picocrypt-NG/Picocrypt-NG.deb out
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact_name }}
        path: out/*
        if-no-files-found: error
        compression-level: 9

  pr-test-build-linux:
    needs: build
    runs-on: ubuntu-24.04
    if: always()
    steps:
    - name: Require all Linux matrix jobs to pass
      run: |
        if [ "${{ needs.build.result }}" != "success" ]; then
          echo "Linux matrix result: ${{ needs.build.result }}"
          exit 1
        fi
