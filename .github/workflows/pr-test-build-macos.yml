name: pr-test-build-macos

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-test-build-macos:
    runs-on: macos-26
    env:
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      CGO_CFLAGS: "-mmacosx-version-min=15.0"
      CGO_LDFLAGS: "-mmacosx-version-min=15.0"
    steps:
    - uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: stable
        cache-dependency-path: src/go.sum

    - name: Install packages
      run: |
        brew install glfw glew

    - name: Install dependencies
      run: |
        cd src
        go mod download

    - name: Run tests
      # Skip internal/crypto and internal/volume - Argon2 is extremely slow on macOS ARM64 runners
      run: |
        cd src
        go test -v -race -timeout 15m ./internal/encoding/... ./internal/fileops/... ./internal/header/... ./internal/keyfile/... ./internal/util/...

    - name: Build GUI
      run: |
        cd src
        go build -v -ldflags="-s -w" -o Picocrypt-NG ./cmd/picocrypt
      env:
        CGO_ENABLED: 1

    - name: Verify macOS GUI deployment target
      run: |
        bash .github/scripts/assert-macos-minos.sh src/Picocrypt-NG 15.0

    - name: Build CLI-only (no graphics dependencies)
      run: |
        cd src
        go build -v -tags cli -ldflags="-s -w" -o Picocrypt-NG-cli-macos ./cmd/picocrypt
      env:
        CGO_ENABLED: 1

    - name: Package as .app in a .dmg
      run: |
        mv dist/macos/Picocrypt-NG.app.zip .
        unzip -d Picocrypt-NG.app Picocrypt-NG.app.zip
        rm Picocrypt-NG.app.zip
        mv src/Picocrypt-NG Picocrypt-NG.app/Contents/MacOS/Picocrypt-NG
        rm Picocrypt-NG.app/Contents/Resources/icon.icns
        mv dist/macos/iconSmall.icns Picocrypt-NG.app/Contents/Resources/icon.icns
        # === Phase 3 (FA-MAC-04): inject canonical Info.plist ===
        cp dist/macos/Info.plist Picocrypt-NG.app/Contents/Info.plist
        plutil -replace CFBundleShortVersionString -string "$(cat VERSION)" \
            Picocrypt-NG.app/Contents/Info.plist
        plutil -replace CFBundleVersion -string "$(cat VERSION)" \
            Picocrypt-NG.app/Contents/Info.plist
        plutil -lint Picocrypt-NG.app/Contents/Info.plist
        # Sanity assertion: UTI must round-trip through plutil -extract (json form per Pitfall #7)
        plutil -extract CFBundleDocumentTypes json -o - \
            Picocrypt-NG.app/Contents/Info.plist | grep -q 'io.github.picocryptng.pcv' \
            || (echo "::error::CFBundleDocumentTypes lost UTI ref"; exit 1)
        plutil -extract UTExportedTypeDeclarations json -o - \
            Picocrypt-NG.app/Contents/Info.plist | grep -q 'io.github.picocryptng.pcv' \
            || (echo "::error::UTExportedTypeDeclarations lost UTI"; exit 1)
        # === end Phase 3 ===
        mkdir out
        cp -R Picocrypt-NG.app out
        hdiutil create Picocrypt-NG.dmg -volname Picocrypt-NG -fs APFS -format UDZO -srcfolder out

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: pr-test-build-macos-ONLY-FOR-TESTING
        path: |
          Picocrypt-NG.dmg
          src/Picocrypt-NG-cli-macos
        if-no-files-found: error
        compression-level: 9
