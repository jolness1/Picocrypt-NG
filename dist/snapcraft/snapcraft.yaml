name: picocrypt-ng
summary: A very small, very simple, yet very secure encryption tool.
description: Picocrypt NG is a very small, very simple, yet very secure encryption tool that you can use to protect your files. It's designed to be the go-to tool for encryption, with a focus on security, simplicity, and reliability. Picocrypt NG uses the secure XChaCha20 cipher and the Argon2id key derivation function to provide a high level of security.
version: "2.08"
confinement: strict
base: core22
grade: stable

apps:
  picocrypt-ng:
    command: bin/Picocrypt-NG
    environment:
      NO_AT_BRIDGE: 1
      LIBGL_ALWAYS_SOFTWARE: 1
    extensions: [gnome]
    plugs:
      - home

parts:
  picocrypt-ng:
    plugin: go
    source: .
    override-build: |
      craftctl default
      # MIME XML — system-wide MIME registration declaration
      install -d "$CRAFT_PART_INSTALL/usr/share/mime/packages"
      install -m 0644 "$CRAFT_PROJECT_DIR/dist/mime/application-x-pcv.xml" \
        "$CRAFT_PART_INSTALL/usr/share/mime/packages/"
      # Hicolor mimetypes icon set (16/32/48/64/128/256 PNG + scalable SVG)
      for size in 16 32 48 64 128 256; do
        install -d "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/${size}x${size}/mimetypes"
        install -m 0644 "$CRAFT_PROJECT_DIR/images/pcv-icon-${size}.png" \
          "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/${size}x${size}/mimetypes/application-x-pcv.png"
      done
      install -d "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/mimetypes"
      install -m 0644 "$CRAFT_PROJECT_DIR/images/pcv-icon.svg" \
        "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/scalable/mimetypes/application-x-pcv.svg"
    build-packages:
      - gcc
      - pkg-config
      - libgl1-mesa-dev
      - xorg-dev
      - libgtk-3-dev
      - libxcursor-dev
      - libxrandr-dev
      - libxinerama-dev
      - libxi-dev
      - libxxf86vm-dev
      - libffi-dev
    build-snaps:
      - go
    stage-packages:
      - libc6
      - libgcc-s1
      - libgl1
      - libglu1-mesa
      - libgtk-3-0
      - libstdc++6
      - libx11-6
      - libffi7
