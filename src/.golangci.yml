version: "2"

run:
  timeout: 5m
  build-tags:
    - cli
  modules-download-mode: vendor
  tests: false

linters:
  default: standard
  enable:
    - gosec
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
  disable:
    - depguard
  exclusions:
    paths:
      - vendor
      - fyne
      - testdata
    presets:
      - std-error-handling
    rules:
      - path: internal/ui/
        linters:
          - typecheck
  settings:
    gosec:
      excludes:
        - G304 # File inclusion via variable - expected for file encryption tool
        - G204 # Subprocess with variable - test builds
      config:
        global:
          nosec: true
          show-ignored: false
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
    staticcheck:
      checks:
        - "all"
        - "-QF1003" # tagged switch suggestion - too pedantic
